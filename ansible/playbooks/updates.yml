---
- name: Update Hosts
  hosts: all
  become: true

  tasks:

    # PACKAGES - Ensure latest packages are installed
    - name: Packages - Ensure latest packages are installed.
      ansible.builtin.apt:
        upgrade: full
        update_cache: true

    # Check if a system reboot is required
    - name: Check if a system reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
        get_checksum: false
      register: reboot_required_file

    # REBOOT - Check if reboot is required, and if so, reboot the server safely
    - name: Reboot the server safely
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible after package updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required_file.stat.exists
